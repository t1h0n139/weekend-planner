<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>7-Day Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --weekday:#2746F5;--weekend:#F57D27;
  --weekday-light:#EEF1FF;--weekend-light:#FFF3E8;
  --ink:#0D0D0D;--ink2:#444;--ink3:#888;--surface:#fff;--bg:#F5F3EE;
  --radius:14px;--radius-sm:8px;
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;}

/* HERO */
.hero{position:relative;min-height:240px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;}
.hero-img{position:absolute;inset:0;background-size:cover;background-position:center;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.1) 60%,transparent 100%);}
.hero-content{position:relative;z-index:2;padding:2rem 1.5rem 1.25rem;}
.hero-eyebrow{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:5px;}
.hero-title{font-family:var(--font-display);font-size:clamp(26px,5vw,44px);font-weight:800;color:#fff;line-height:1.05;outline:none;border:none;background:transparent;width:100%;caret-color:#fff;}
.hero-title::placeholder{color:rgba(255,255,255,.3);}
.hero-meta{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;}
.hero-date{font-size:13px;color:rgba(255,255,255,.7);}
.cover-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);cursor:pointer;}
.cover-btn:hover{background:rgba(255,255,255,.22);}

/* DEST BAR */
.dest-bar{background:var(--surface);border-bottom:1px solid #E8E6E0;padding:9px 1.5rem;display:flex;align-items:center;gap:10px;flex-wrap:nowrap;overflow:hidden;}
.dest-wrap{display:flex;align-items:center;flex:1;min-width:160px;background:#F5F3EE;border-radius:var(--radius-sm);border:1.5px solid transparent;transition:border-color .2s;}
.dest-wrap:focus-within{border-color:var(--weekday);}
.dest-icon{padding:0 8px 0 10px;font-size:13px;color:var(--ink3);}
.dest-input{flex:1;font-family:var(--font-body);font-size:13px;border:none;background:transparent;outline:none;padding:8px 0;color:var(--ink);}
.dest-input::placeholder{color:var(--ink3);}
.weather-btn{padding:8px 14px;font-family:var(--font-body);font-size:13px;font-weight:500;border-radius:var(--radius-sm);border:none;background:var(--ink);color:#fff;cursor:pointer;white-space:nowrap;}
.weather-btn:hover{opacity:.85;}
.weather-pill{font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500;white-space:nowrap;}
.w-wd{background:var(--weekday-light);color:var(--weekday);}
.w-we{background:var(--weekend-light);color:#B05C00;}
.weather-error{font-size:12px;color:#cc3300;}

/* LAYOUT */
.main{max-width:1400px;margin:0 auto;padding:1.25rem 1.5rem 3rem;}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:var(--surface);border-radius:var(--radius-sm);padding:4px;border:1px solid #E8E6E0;}
.tab{flex:1;font-family:var(--font-body);font-size:13px;font-weight:500;padding:7px;border:none;background:transparent;cursor:pointer;border-radius:6px;color:var(--ink3);transition:all .15s;}
.tab.active{background:var(--ink);color:#fff;}

/* SUMMARY BAR */
.summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1.25rem;}
.sum-card{background:var(--surface);border-radius:var(--radius-sm);padding:12px 14px;border:1.5px solid #E8E6E0;}
.sum-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:3px;}
.sum-val{font-family:var(--font-display);font-size:19px;font-weight:700;color:var(--ink);}
.sum-input{font-family:var(--font-display);font-size:19px;font-weight:700;border:none;background:transparent;outline:none;color:var(--ink);width:100%;}
.sum-input::placeholder{color:#ccc;}
.sum-card.accent-wd{border-color:var(--weekday);background:var(--weekday-light);}
.sum-card.accent-we{border-color:var(--weekend);background:var(--weekend-light);}
.sum-card.over{border-color:#cc3300;background:#fff0ed;}

/* DAY COLUMNS */
.week-grid{display:grid;grid-template-columns:repeat(7,minmax(160px,1fr));gap:12px;overflow-x:auto;padding-bottom:4px;}
@media(max-width:900px){.week-grid{grid-template-columns:repeat(4,minmax(220px,1fr));}}
@media(max-width:540px){.week-grid{grid-template-columns:repeat(2,minmax(200px,1fr));}}

.day-col{display:flex;flex-direction:column;gap:8px;min-width:0;}
.day-header{border-radius:var(--radius-sm);padding:10px 12px;font-family:var(--font-display);font-size:13px;font-weight:800;display:flex;flex-direction:column;gap:2px;}
.day-header.wd{background:var(--weekday);color:#fff;}
.day-header.we{background:var(--weekend);color:#fff;}
.day-header-name{font-size:13px;}
.day-header-date{font-size:10px;opacity:.75;font-family:var(--font-body);font-weight:500;}
.day-header-total{font-size:10px;font-family:var(--font-body);font-weight:500;margin-top:2px;opacity:.85;}
.day-weather{font-size:10px;opacity:.75;font-family:var(--font-body);}

/* ACTIVITY CARDS */
.act-card{background:var(--surface);border-radius:var(--radius-sm);border:1.5px solid #E8E6E0;overflow:hidden;cursor:grab;transition:box-shadow .15s;}
.act-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);}
.act-card.dragging{opacity:.45;transform:scale(.97);}
.act-card.drag-over{border-color:var(--weekday);box-shadow:0 0 0 2px var(--weekday);}
.act-bar{height:3px;}
.act-bar.wd{background:var(--weekday);}
.act-bar.we{background:var(--weekend);}
.act-body{padding:9px 10px;}
.act-top{display:flex;align-items:flex-start;gap:6px;}
.drag-handle{font-size:12px;color:#ccc;cursor:grab;padding-top:1px;flex-shrink:0;user-select:none;}
.act-main{flex:1;min-width:0;}
.act-time{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:2px;}
.act-time.wd{color:var(--weekday);}
.act-time.we{color:#B05C00;}
.act-name{font-size:13px;font-weight:500;color:var(--ink);line-height:1.3;word-break:break-word;}
.act-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:4px;}
.act-loc{font-size:11px;color:var(--ink3);}
.act-cost-badge{font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;}
.act-cost-badge.paid{background:var(--weekend-light);color:#B05C00;}
.act-cost-badge.free{background:#E8F5EE;color:#0A5C38;}
.act-actions{display:flex;gap:2px;flex-shrink:0;}
.icon-btn{width:24px;height:24px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:12px;color:var(--ink3);display:flex;align-items:center;justify-content:center;}
.icon-btn:hover{background:#F5F3EE;}
.icon-btn.del:hover{background:#FFF0ED;color:var(--weekend);}
.act-notes{font-size:11px;color:var(--ink3);padding:5px 10px 8px 22px;border-top:1px solid #F0EEE8;line-height:1.5;}
.notes-expand{padding:0 10px 8px 22px;}
.notes-input{width:100%;font-family:var(--font-body);font-size:11px;border:1px solid #E0DEDB;border-radius:5px;padding:5px 8px;resize:none;color:var(--ink);background:#FAFAF8;outline:none;line-height:1.4;}
.notes-input:focus{border-color:var(--weekday);}

/* ADD FORM */
.add-form{background:var(--surface);border-radius:var(--radius-sm);border:1.5px dashed #D8D6D0;padding:10px;}
.fg{margin-bottom:7px;}
.fg label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);display:block;margin-bottom:3px;}
.fg input,.fg textarea{width:100%;font-family:var(--font-body);font-size:12px;padding:6px 8px;border:1.5px solid #E0DEDB;border-radius:5px;background:#FAFAF8;color:var(--ink);outline:none;}
.fg input:focus,.fg textarea:focus{border-color:var(--weekday);}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.form-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:6px;}
.btn{padding:6px 13px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid #D8D6D0;background:transparent;color:var(--ink);}
.btn:hover{background:#F5F3EE;}
.btn-wd{background:var(--weekday);color:#fff;border-color:var(--weekday);}
.btn-wd:hover{opacity:.85;}
.btn-we{background:var(--weekend);color:#fff;border-color:var(--weekend);}
.btn-we:hover{opacity:.85;}
.btn-primary{background:var(--ink);color:#fff;border-color:var(--ink);}
.btn-primary:hover{opacity:.85;}
.add-trigger{display:flex;align-items:center;gap:5px;font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--ink3);background:transparent;border:1.5px dashed #D8D6D0;border-radius:var(--radius-sm);padding:7px 10px;cursor:pointer;width:100%;}
.add-trigger:hover{border-color:var(--ink3);color:var(--ink);background:var(--surface);}

/* EMPTY STATE */
.empty-state{grid-column:1/-1;text-align:center;padding:2.5rem 1rem;background:var(--surface);border-radius:var(--radius);border:1.5px dashed #D8D6D0;}
.empty-icon{font-size:32px;margin-bottom:10px;}
.empty-title{font-family:var(--font-display);font-size:17px;font-weight:700;margin-bottom:6px;}
.empty-desc{font-size:13px;color:var(--ink3);line-height:1.6;margin-bottom:14px;}

/* MAP TAB */
.map-tab-layout{display:flex;flex-direction:column;gap:14px;}
.map-search-panel{background:var(--surface);border-radius:var(--radius);border:1.5px solid #E8E6E0;padding:14px 16px;}
.map-search-title{font-family:var(--font-display);font-size:14px;font-weight:700;margin-bottom:10px;}
.map-search-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.map-search-field{flex:1;min-width:160px;}
.map-search-field label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);display:block;margin-bottom:4px;}
.map-search-input{width:100%;font-family:var(--font-body);font-size:13px;padding:8px 10px;border:1.5px solid #E0DEDB;border-radius:var(--radius-sm);background:#FAFAF8;color:var(--ink);outline:none;}
.map-search-input:focus{border-color:var(--weekday);}
.search-btn{padding:8px 18px;font-family:var(--font-body);font-size:13px;font-weight:500;border-radius:var(--radius-sm);border:none;background:var(--weekday);color:#fff;cursor:pointer;white-space:nowrap;}
.search-btn:hover{opacity:.85;}
.search-btn:disabled{opacity:.5;cursor:not-allowed;}
.radius-field{min-width:190px;}
.radius-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.radius-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);}
.radius-val{font-size:11px;font-weight:700;color:var(--weekday);background:var(--weekday-light);padding:2px 8px;border-radius:20px;}
.radius-slider{width:100%;appearance:none;height:5px;border-radius:3px;background:#E0DEDB;outline:none;cursor:pointer;}
.radius-slider::-webkit-slider-thumb{appearance:none;width:18px;height:18px;border-radius:50%;background:var(--weekday);cursor:grab;border:2px solid #fff;box-shadow:0 2px 5px rgba(39,70,245,.35);}
.radius-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--weekday);cursor:grab;border:2px solid #fff;}
.venue-type-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;}
.venue-chip{font-size:11px;padding:4px 10px;border-radius:20px;border:1.5px solid #E0DEDB;background:transparent;cursor:pointer;font-family:var(--font-body);color:var(--ink3);}
.venue-chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}

/* SORT BAR */
.sort-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sort-label{font-size:11px;color:var(--ink3);font-weight:500;}
.sort-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1.5px solid #E0DEDB;background:transparent;cursor:pointer;font-family:var(--font-body);color:var(--ink3);}
.sort-btn.active{background:var(--weekday);color:#fff;border-color:var(--weekday);}

.map-wrap{border-radius:var(--radius);overflow:hidden;border:1.5px solid #E8E6E0;height:400px;}
#mapEl{width:100%;height:100%;}
.pin-section-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin:12px 0 7px;}
.pin-list{display:flex;flex-direction:column;gap:6px;}
.pin-item{background:var(--surface);border-radius:var(--radius-sm);border:1.5px solid #E8E6E0;padding:9px 12px;display:flex;align-items:center;gap:10px;transition:border-color .15s;}.pin-item:hover{border-color:#ccc;}
.pin-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:#fff;}
.pin-name{font-size:13px;font-weight:500;}
.pin-sub{font-size:11px;color:var(--ink3);margin-top:1px;}

/* VENUE CARDS */
.venue-results-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.venue-results-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);}
.venue-count{font-size:11px;font-weight:700;color:var(--weekday);background:var(--weekday-light);padding:2px 10px;border-radius:20px;}
.venue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;}
.venue-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid #E8E6E0;overflow:hidden;transition:box-shadow .15s,border-color .15s;cursor:pointer;}
.venue-card:hover{box-shadow:0 5px 18px rgba(0,0,0,.09);border-color:#ccc;}
.venue-card.highlighted{border-color:var(--weekday);box-shadow:0 0 0 2px var(--weekday);}
.venue-card-thumb{height:100px;display:flex;align-items:center;justify-content:center;position:relative;font-size:36px;}
.venue-type-badge{position:absolute;top:7px;left:7px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:capitalize;}
.venue-dist-badge{position:absolute;top:7px;right:7px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(0,0,0,.55);color:#fff;}
.venue-card-body{padding:10px 12px;}
.venue-card-name{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px;line-height:1.2;}
.venue-card-addr{font-size:11px;color:var(--ink3);margin-bottom:6px;line-height:1.4;}
.venue-card-hours{font-size:11px;color:var(--ink2);margin-bottom:8px;line-height:1.4;}
.venue-card-actions{display:flex;gap:6px;flex-wrap:wrap;}
.add-day-btn{font-size:11px;padding:5px 10px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:var(--font-body);font-weight:500;}
.add-day-btn.wd{background:var(--weekday);color:#fff;}
.add-day-btn.wd:hover{opacity:.85;}
.add-day-btn.we{background:var(--weekend);color:#fff;}
.add-day-btn.we:hover{opacity:.85;}
.day-select{font-size:11px;padding:5px 8px;border-radius:var(--radius-sm);border:1.5px solid #E0DEDB;background:#FAFAF8;font-family:var(--font-body);color:var(--ink);outline:none;cursor:pointer;}
.day-select:focus{border-color:var(--weekday);}

/* SHARE */
.share-wrap{background:var(--surface);border-radius:var(--radius);border:1.5px solid #E8E6E0;padding:18px;}
.share-title{font-family:var(--font-display);font-size:19px;font-weight:700;margin-bottom:12px;}
.share-output{background:#F5F3EE;border-radius:var(--radius-sm);padding:12px;font-family:monospace;font-size:12px;color:var(--ink2);white-space:pre-wrap;line-height:1.8;margin-bottom:12px;}

/* COVER MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;}
.modal{background:var(--surface);border-radius:var(--radius);padding:22px;width:100%;max-width:430px;}
.modal h3{font-family:var(--font-display);font-size:17px;font-weight:700;margin-bottom:14px;}
.modal label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);display:block;margin-bottom:4px;}
.modal input{width:100%;font-family:var(--font-body);font-size:13px;padding:8px 10px;border:1.5px solid #E0DEDB;border-radius:var(--radius-sm);outline:none;color:var(--ink);margin-bottom:10px;}
.modal input:focus{border-color:var(--weekday);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:2px;}
.preset-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.preset-img{width:100%;aspect-ratio:16/9;border-radius:5px;background-size:cover;background-position:center;cursor:pointer;border:2px solid transparent;}
.preset-img:hover,.preset-img.selected{border-color:var(--weekday);}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-img" id="heroBg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">7-Day Planner</div>
    <input class="hero-title" id="tripName" placeholder="Name your trip..." value="My Week Away" maxlength="60"/>
    <div class="hero-meta">
      <span class="hero-date" id="heroDate"></span>
      <button class="cover-btn" onclick="openCoverModal()">+ Cover photo</button>
    </div>
  </div>
</div>

<div class="dest-bar">
  <div class="dest-wrap">
    <span class="dest-icon">📍</span>
    <input class="dest-input" id="destInput" placeholder="Enter destination..."/>
  </div>
  <button class="weather-btn" onclick="fetchWeather()">Get weather</button>
  <div id="weatherPills" style="display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-ms-overflow-style:none;padding:2px 0;min-width:0;flex:1;"></div>
  <div class="weather-error" id="weatherError"></div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('plan',this)">Plan</button>
    <button class="tab" onclick="switchTab('map',this)">Map</button>
    <button class="tab" onclick="switchTab('share',this)">Share</button>
  </div>

  <!-- PLAN -->
  <div id="planTab">
    <div class="summary-bar" id="summaryBar"></div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <!-- MAP -->
  <div id="mapTab" style="display:none;">
    <div class="map-tab-layout">
      <div class="map-search-panel">
        <div class="map-search-title">Find food &amp; drink nearby</div>
        <div class="map-search-row">
          <div class="map-search-field">
            <label>UK postcode</label>
            <input class="map-search-input" id="venueSearchInput" placeholder="e.g. EH1 1YZ or SW1A 1AA" onkeydown="if(event.key==='Enter')searchVenues()"/>
            <div id="searchError" style="font-size:11px;color:#cc3300;margin-top:3px;"></div>
          </div>
          <div class="map-search-field radius-field">
            <div class="radius-label-row">
              <span class="radius-label">Search radius</span>
              <span class="radius-val" id="radiusVal">1.0 mi</span>
            </div>
            <input type="range" class="radius-slider" id="radiusSlider" min="0.25" max="5" step="0.25" value="1.0" oninput="updateRadius(this.value)"/>
          </div>
          <button class="search-btn" id="venueSearchBtn" onclick="searchVenues()">Search</button>
        </div>
        <div class="venue-type-row" id="venueTypeRow"></div>
      </div>

      <div class="map-wrap"><div id="mapEl"></div></div>

      <div id="itineraryPins"></div>

      <div id="venueResults" style="display:none;">
        <div class="venue-results-header">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="venue-results-title">Results</span>
            <span class="venue-count" id="venueCount"></span>
          </div>
          <div class="sort-bar">
            <span class="sort-label">Sort:</span>
            <button class="sort-btn active" id="sortDistBtn" onclick="setSortMode('distance')">Nearest first</button>
            <button class="sort-btn" id="sortNameBtn" onclick="setSortMode('name')">A–Z</button>
          </div>
        </div>
        <div class="venue-grid" id="venueGrid"></div>
      </div>
    </div>
  </div>

  <!-- SHARE -->
  <div id="shareTab" style="display:none;">
    <div class="share-wrap">
      <div class="share-title">Share itinerary</div>
      <div class="share-output" id="shareText"></div>
      <button class="btn btn-primary" onclick="copyShare()">Copy to clipboard</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="coverModal" style="display:none;" onclick="if(event.target===this)closeCoverModal()">
  <div class="modal">
    <h3>Cover photo</h3>
    <p style="font-size:12px;color:var(--ink3);margin-bottom:12px;">Choose a preset or paste any image URL.</p>
    <div class="preset-grid" id="presetGrid"></div>
    <label>Custom image URL</label>
    <input type="url" id="coverUrlInput" placeholder="https://..."/>
    <div class="modal-actions">
      <button class="btn" onclick="closeCoverModal()">Cancel</button>
      <button class="btn btn-wd" onclick="applyCover()">Apply</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_CLS=d=>['Saturday','Sunday'].includes(d)?'we':'wd';
const DAY_COLOR=d=>['Saturday','Sunday'].includes(d)?'#F57D27':'#2746F5';
const UK_POSTCODE=/^[A-Z]{1,2}[0-9][0-9A-Z]?\s*[0-9][A-Z]{2}$/i;

const PRESETS=[
  'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80',
  'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1200&q=80',
  'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1200&q=80',
  'https://images.unsplash.com/photo-1519677100203-a0e668c92439?w=1200&q=80',
  'https://images.unsplash.com/photo-1493558103817-58b2924bce98?w=1200&q=80',
  'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1200&q=80',
  'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=1200&q=80',
  'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1200&q=80',
];

const VENUE_TYPES=[
  {key:'restaurant',label:'🍽 Restaurants'},
  {key:'bar',label:'🍸 Bars'},
  {key:'pub',label:'🍺 Pubs'},
  {key:'cafe',label:'☕ Cafés'},
  {key:'fast_food',label:'🍔 Fast food'},
  {key:'ice_cream',label:'🍦 Ice cream'},
];

const TYPE_COLORS={
  restaurant:{bg:'#FFF0ED',text:'#FF5C3A'},
  bar:{bg:'#EEF0FF',text:'#2746F5'},
  pub:{bg:'#FFF5E0',text:'#A07000'},
  cafe:{bg:'#F0F8EE',text:'#2A7A3B'},
  fast_food:{bg:'#FFF3EE',text:'#CC5500'},
  ice_cream:{bg:'#FEF0F8',text:'#AA3377'},
  food_court:{bg:'#F0F8EE',text:'#2A7A3B'},
  biergarten:{bg:'#FFF5E0',text:'#A07000'},
};

// ── STATE ──────────────────────────────────────────────────────────────────
let activities={};
DAYS.forEach(d=>activities[d]=[]);
let openForm=null, openNotes={};
let weatherData={};
let leafletMap=null, radiusCircle=null, mapInitialised=false;
let nextId=100;
let dragSrc=null,dragSrcDay=null,dragSrcIdx=null;
let allVenues=[], activeVenueTypes=new Set(['restaurant','bar','cafe','pub','fast_food','ice_cream','food_court','biergarten']);
let highlightedVenueId=null;
let searchCenter=null, sortMode='distance';
let itinMarkers=[], venueMarkers=[];
let coverUrl='';
let weekStart=null;

// ── UTILS ──────────────────────────────────────────────────────────────────
function getMondayOfCurrentWeek(){
  const today=new Date();
  const dow=today.getDay();
  const diff=dow===0?-6:1-dow;
  const mon=new Date(today);mon.setDate(today.getDate()+diff);
  return mon;
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtShort(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function fmtDate(d){return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});}
function escH(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function miToMeters(mi){return mi*1609.34;}
function mToMi(m){return m/1609.34;}
function haversineKm(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(km){
  const mi=km*0.621371;
  return mi<0.1?Math.round(km*1000)+'m':mi.toFixed(1)+' mi';
}
function typeEmoji(t){return{restaurant:'🍽',bar:'🍸',pub:'🍺',cafe:'☕',fast_food:'🍔',ice_cream:'🍦',food_court:'🥡',biergarten:'🍻'}[t]||'🍴';}
function formatHours(h){if(!h)return'';if(h.length>55)return h.slice(0,52)+'…';return h.replace(/;/g,' · ');}

// ── INIT ───────────────────────────────────────────────────────────────────
function init(){
  weekStart=getMondayOfCurrentWeek();
  const end=addDays(weekStart,6);
  document.getElementById('heroDate').textContent=fmtShort(weekStart)+' – '+fmtShort(end);
  buildPresets();
  buildVenueTypeChips();
  setHeroBg(PRESETS[0]);
  render();
}

function setHeroBg(url){coverUrl=url;document.getElementById('heroBg').style.backgroundImage=`url(${url})`;}
function buildPresets(){
  const g=document.getElementById('presetGrid');g.innerHTML='';
  PRESETS.forEach(u=>{
    const d=document.createElement('div');d.className='preset-img';d.style.backgroundImage=`url(${u})`;
    d.onclick=()=>{document.querySelectorAll('.preset-img').forEach(x=>x.classList.remove('selected'));d.classList.add('selected');document.getElementById('coverUrlInput').value=u;};
    g.appendChild(d);
  });
}
function openCoverModal(){document.getElementById('coverModal').style.display='flex';}
function closeCoverModal(){document.getElementById('coverModal').style.display='none';}
function applyCover(){const u=document.getElementById('coverUrlInput').value.trim();if(u)setHeroBg(u);closeCoverModal();}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){renderSummary();renderWeek();}

function renderSummary(){
  const all=DAYS.flatMap(d=>activities[d]);
  const total=all.reduce((s,a)=>s+a.cost,0);
  const wdTotal=DAYS.slice(0,5).flatMap(d=>activities[d]).reduce((s,a)=>s+a.cost,0);
  const weTotal=DAYS.slice(5).flatMap(d=>activities[d]).reduce((s,a)=>s+a.cost,0);
  const bv=parseFloat(document.getElementById('_budget')?.value)||0;
  const rem=bv>0?bv-total:null;
  document.getElementById('summaryBar').innerHTML=`
    <div class="sum-card"><div class="sum-label">Activities</div><div class="sum-val">${all.length}</div></div>
    <div class="sum-card accent-wd"><div class="sum-label">Mon–Fri</div><div class="sum-val">£${wdTotal}</div></div>
    <div class="sum-card accent-we"><div class="sum-label">Weekend</div><div class="sum-val">£${weTotal}</div></div>
    <div class="sum-card"><div class="sum-label">Total</div><div class="sum-val">£${total}</div></div>
    <div class="sum-card ${rem!==null&&rem<0?'over':''}"><div class="sum-label">Budget</div><input class="sum-input" id="_budget" type="number" placeholder="£" min="0" value="${document.getElementById('_budget')?.value||''}" oninput="renderSummary()"/></div>
    ${rem!==null?`<div class="sum-card ${rem<0?'over':''}"><div class="sum-label">Remaining</div><div class="sum-val" style="color:${rem<0?'#cc3300':'#0A5C38'}">${rem<0?'-£':'£'}${Math.abs(Math.round(rem))}</div></div>`:''}`;
}

function renderWeek(){
  const grid=document.getElementById('weekGrid');grid.innerHTML='';
  const total=DAYS.flatMap(d=>activities[d]).length;
  if(total===0){
    grid.innerHTML='<div class="empty-state"><div class="empty-icon">🗺</div><div class="empty-title">No activities yet</div><div class="empty-desc">Search for bars and restaurants in the Map tab,<br>then add them to any day of the week.</div><button class="btn btn-wd" onclick="document.querySelectorAll(\'.tab\')[1].click()">Go to Map →</button></div>';
    return;
  }
  DAYS.forEach((day,di)=>{
    const col=document.createElement('div');col.className='day-col';
    const cls=DAY_CLS(day);
    const w=weatherData[day];
    const date=addDays(weekStart,di);
    const dayTotal=activities[day].reduce((s,a)=>s+a.cost,0);
    col.innerHTML=`<div class="day-header ${cls}">
      <span class="day-header-name">${day.slice(0,3)}</span>
      <span class="day-header-date">${fmtShort(date)}</span>
      ${activities[day].length?`<span class="day-header-total">£${dayTotal} · ${activities[day].length} act.</span>`:''}
      ${w?`<span class="day-weather">${w.icon} ${w.max}°C</span>`:''}
    </div>`;
    activities[day].forEach((a,i)=>col.appendChild(buildCard(a,day,i,cls)));
    const addBtn=document.createElement('button');
    addBtn.className='add-trigger';
    addBtn.innerHTML='<span style="font-size:15px;line-height:1">+</span> Add';
    addBtn.onclick=()=>{openForm=openForm===day?null:day;renderWeek();};
    col.appendChild(addBtn);
    if(openForm===day)col.appendChild(buildForm(day,cls));
    grid.appendChild(col);
  });
}

function buildCard(a,day,idx,cls){
  const card=document.createElement('div');
  card.className='act-card';card.draggable=true;
  card.dataset.day=day;card.dataset.idx=idx;
  const hasNotes=a.notes&&a.notes.trim();
  const showNotes=openNotes[a.id];
  card.innerHTML=`
    <div class="act-bar ${cls}"></div>
    <div class="act-body">
      <div class="act-top">
        <span class="drag-handle">⠿</span>
        <div class="act-main">
          <div class="act-time ${cls}">${a.time}</div>
          <div class="act-name">${escH(a.name)}</div>
          <div class="act-meta">
            ${a.location?`<span class="act-loc">📍 ${escH(a.location)}</span>`:''}
            <span class="act-cost-badge ${a.cost>0?'paid':'free'}">${a.cost>0?'£'+a.cost:'Free'}</span>
          </div>
        </div>
        <div class="act-actions">
          <button class="icon-btn" onclick="toggleNotes(${a.id})">✏️</button>
          <button class="icon-btn del" onclick="deleteActivity('${day}',${a.id})">✕</button>
        </div>
      </div>
      ${hasNotes&&!showNotes?`<div class="act-notes">${escH(a.notes)}</div>`:''}
    </div>
    ${showNotes?`<div class="notes-expand"><textarea class="notes-input" rows="2" placeholder="Add notes..." onchange="updateNotes('${day}',${a.id},this.value)">${escH(a.notes||'')}</textarea></div>`:''}`;
  card.addEventListener('dragstart',e=>{dragSrc=a;dragSrcDay=day;dragSrcIdx=idx;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.act-card').forEach(c=>c.classList.remove('drag-over'));});
  card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-over');});
  card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
  card.addEventListener('drop',e=>{
    e.preventDefault();card.classList.remove('drag-over');
    if(dragSrc&&(dragSrcDay!==day||dragSrcIdx!==idx)){
      activities[dragSrcDay].splice(dragSrcIdx,1);
      const ti=parseInt(card.dataset.idx);
      if(dragSrcDay===day)activities[day].splice(ti,0,dragSrc);
      else{dragSrc.id=nextId++;activities[day].splice(ti,0,dragSrc);}
      render();
    }
  });
  return card;
}

function toggleNotes(id){openNotes[id]=!openNotes[id];renderWeek();}
function updateNotes(day,id,val){const a=activities[day].find(x=>x.id===id);if(a)a.notes=val;}

function buildForm(day,cls){
  const form=document.createElement('div');form.className='add-form';
  form.innerHTML=`
    <div class="fg-row">
      <div class="fg"><label>Activity name</label><input id="fName" placeholder="e.g. Dinner at..."/></div>
      <div class="fg"><label>Time</label><input id="fTime" type="time" value="12:00"/></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>Location</label><input id="fLoc" placeholder="Address or area"/></div>
      <div class="fg"><label>Cost (£)</label><input id="fCost" type="number" placeholder="0" min="0" step="0.01"/></div>
    </div>
    <div class="fg"><label>Notes</label><textarea id="fNotes" rows="2" style="width:100%;font-family:var(--font-body);font-size:11px;padding:5px 7px;border:1.5px solid #E0DEDB;border-radius:5px;background:#FAFAF8;color:var(--ink);outline:none;resize:none;" placeholder="Tips, reminders..."></textarea></div>
    <div class="form-actions">
      <button class="btn" onclick="openForm=null;renderWeek()">Cancel</button>
      <button class="btn btn-${cls}" onclick="addActivity('${day}')">Add</button>
    </div>`;
  setTimeout(()=>{const el=document.getElementById('fName');if(el)el.focus();},50);
  return form;
}

function addActivity(day){
  const name=document.getElementById('fName').value.trim();
  if(!name){document.getElementById('fName').focus();return;}
  activities[day].push({id:nextId++,name,time:document.getElementById('fTime').value||'12:00',location:document.getElementById('fLoc').value.trim(),cost:parseFloat(document.getElementById('fCost').value)||0,notes:document.getElementById('fNotes').value.trim()});
  activities[day].sort((a,b)=>a.time.localeCompare(b.time));
  openForm=null;render();
}
function deleteActivity(day,id){activities[day]=activities[day].filter(a=>a.id!==id);render();}

// ── WEATHER ────────────────────────────────────────────────────────────────
async function fetchWeather(){
  const dest=document.getElementById('destInput').value.trim();if(!dest)return;
  const pills=document.getElementById('weatherPills'),err=document.getElementById('weatherError');
  pills.innerHTML='<span style="font-size:12px;color:var(--ink3)">Fetching...</span>';err.textContent='';
  try{
    const gr=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(dest)}&format=json&limit=1`);
    const gd=await gr.json();if(!gd.length)throw new Error('Location not found');
    const{lat,lon}=gd[0];
    const wr=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=16`);
    const wd=await wr.json();
    weatherData={};pills.innerHTML='';
    DAYS.forEach((day,di)=>{
      const date=addDays(weekStart,di);
      const ds=date.toISOString().slice(0,10);
      const idx=wd.daily.time.indexOf(ds);
      if(idx>=0){
        weatherData[day]=parseWeather(wd.daily,idx);
        const w=weatherData[day];
        const cls=DAY_CLS(day);
        pills.innerHTML+=`<span class="weather-pill w-${cls}">${w.icon} ${day.slice(0,3)} ${w.max}°C</span>`;
      }
    });
    if(!Object.keys(weatherData).length)pills.innerHTML=`<span style="font-size:12px;color:var(--ink3)">Forecast not yet available</span>`;
    renderWeek();
  }catch(e){pills.innerHTML='';err.textContent=e.message||'Could not fetch weather';}
}
function parseWeather(daily,idx){
  const code=daily.weathercode[idx],max=Math.round(daily.temperature_2m_max[idx]),min=Math.round(daily.temperature_2m_min[idx]),rain=daily.precipitation_probability_max[idx];
  const{icon,desc}=wmoToDesc(code,rain);return{code,max,min,rain,icon,desc};
}
function wmoToDesc(code,rain){
  if(code===0)return{icon:'☀️',desc:'Clear'};if(code<=2)return{icon:'⛅',desc:'Partly cloudy'};
  if(code===3)return{icon:'☁️',desc:'Overcast'};if(code<=49)return{icon:'🌫️',desc:'Foggy'};
  if(code<=59)return{icon:'🌦️',desc:'Drizzle'};if(code<=69)return{icon:'🌧️',desc:'Rain'};
  if(code<=79)return{icon:'🌨️',desc:'Snow'};if(code<=84)return{icon:'🌦️',desc:'Showers'};
  return{icon:'⛈️',desc:'Thunderstorm'};
}

// ── MAP ────────────────────────────────────────────────────────────────────
function buildVenueTypeChips(){
  const row=document.getElementById('venueTypeRow');row.innerHTML='';
  VENUE_TYPES.forEach(t=>{
    const chip=document.createElement('button');chip.className='venue-chip active';chip.textContent=t.label;chip.dataset.key=t.key;
    chip.onclick=()=>{
      if(activeVenueTypes.has(t.key)){if(activeVenueTypes.size>1){activeVenueTypes.delete(t.key);chip.classList.remove('active');}}
      else{activeVenueTypes.add(t.key);chip.classList.add('active');}
      renderVenueCards();updateVenueMarkers();
    };
    row.appendChild(chip);
  });
}

function updateRadius(val){
  const mi=parseFloat(val);
  document.getElementById('radiusVal').textContent=mi.toFixed(2).replace(/\.?0+$/,'')+ ' mi';
  if(radiusCircle&&searchCenter)radiusCircle.setRadius(miToMeters(mi));
}

function initMap(){
  if(mapInitialised)return;
  mapInitialised=true;
  const dest=document.getElementById('destInput').value.trim()||'London';
  leafletMap=L.map('mapEl').setView([51.505,-0.09],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(leafletMap);
  geocodeCenter(dest);
}

async function geocodeCenter(dest){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(dest)}&format=json&limit=1`);
    const d=await r.json();
    if(d.length)leafletMap.setView([parseFloat(d[0].lat),parseFloat(d[0].lon)],14);
  }catch(e){}
  plotItineraryPins();
}

async function searchVenues(){
  const query=document.getElementById('venueSearchInput').value.trim();
  const errEl=document.getElementById('searchError');errEl.textContent='';
  if(query&&!UK_POSTCODE.test(query)){errEl.textContent='Please enter a valid UK postcode (e.g. EH1 1YZ)';return;}
  const radiusMi=parseFloat(document.getElementById('radiusSlider').value);
  const radiusM=miToMeters(radiusMi);
  const btn=document.getElementById('venueSearchBtn');
  let center=null;
  if(query){
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query+' UK')}&format=json&limit=1`);
      const d=await r.json();
      if(d.length)center={lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon)};
    }catch(e){}
  }
  if(!center){const mc=leafletMap.getCenter();center={lat:mc.lat,lon:mc.lng};}
  searchCenter=center;
  leafletMap.setView([center.lat,center.lon],15);
  if(radiusCircle)leafletMap.removeLayer(radiusCircle);
  radiusCircle=L.circle([center.lat,center.lon],{radius:radiusM,color:'#2746F5',fillColor:'#2746F5',fillOpacity:0.07,weight:2,dashArray:'6 4'}).addTo(leafletMap);
  leafletMap.fitBounds(radiusCircle.getBounds(),{padding:[20,20]});
  btn.disabled=true;btn.textContent='Searching...';
  const overpassQuery=`[out:json][timeout:25];\nnode(around:${Math.round(radiusM)},${center.lat},${center.lon})[amenity~"restaurant|bar|pub|cafe|fast_food|ice_cream|food_court|biergarten"];\nout body 80;`;
  try{
    const res=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(overpassQuery)});
    const data=await res.json();
    allVenues=data.elements.filter(e=>e.tags&&e.tags.name).map(e=>{
      const dist=haversineKm(center.lat,center.lon,e.lat,e.lon);
      return{id:e.id,name:e.tags.name,type:e.tags.amenity||'food',lat:e.lat,lon:e.lon,dist,address:buildAddress(e.tags),phone:e.tags.phone||'',website:e.tags.website||'',hours:e.tags.opening_hours||'',cuisine:e.tags.cuisine||''};
    });
    renderVenueCards();updateVenueMarkers();
  }catch(e){document.getElementById('venueResults').style.display='none';}
  finally{btn.disabled=false;btn.textContent='Search';}
}

function buildAddress(tags){
  const p=[];
  if(tags['addr:housenumber']&&tags['addr:street'])p.push(tags['addr:housenumber']+' '+tags['addr:street']);
  else if(tags['addr:street'])p.push(tags['addr:street']);
  if(tags['addr:city'])p.push(tags['addr:city']);
  if(tags['addr:postcode'])p.push(tags['addr:postcode']);
  return p.join(', ')||'';
}

function setSortMode(mode){
  sortMode=mode;
  document.getElementById('sortDistBtn').classList.toggle('active',mode==='distance');
  document.getElementById('sortNameBtn').classList.toggle('active',mode==='name');
  renderVenueCards();
}

function getFilteredVenues(){
  const f=allVenues.filter(v=>activeVenueTypes.has(v.type));
  if(sortMode==='distance')return f.sort((a,b)=>a.dist-b.dist);
  return f.sort((a,b)=>a.name.localeCompare(b.name));
}

function renderVenueCards(){
  const filtered=getFilteredVenues();
  const results=document.getElementById('venueResults');
  if(!filtered.length){results.style.display='none';return;}
  results.style.display='';
  document.getElementById('venueCount').textContent=filtered.length+' found';
  const grid=document.getElementById('venueGrid');grid.innerHTML='';
  filtered.forEach(v=>{
    const tc=TYPE_COLORS[v.type]||{bg:'#F5F3EE',text:'#444'};
    const em=typeEmoji(v.type);
    const card=document.createElement('div');
    card.className='venue-card'+(highlightedVenueId===v.id?' highlighted':'');
    card.id='vcard-'+v.id;
    // Day selector dropdown
    const dayOptions=DAYS.map((d,i)=>`<option value="${d}">${d.slice(0,3)} ${fmtShort(addDays(weekStart,i))}</option>`).join('');
    card.innerHTML=`
      <div class="venue-card-thumb" style="background:${tc.bg};">
        ${em}
        <div class="venue-type-badge" style="background:${tc.bg};color:${tc.text};">${v.type.replace('_',' ')}</div>
        <div class="venue-dist-badge">${fmtDist(v.dist)}</div>
      </div>
      <div class="venue-card-body">
        <div class="venue-card-name">${escH(v.name)}</div>
        ${v.address?`<div class="venue-card-addr">📍 ${escH(v.address)}</div>`:''}
        ${v.cuisine?`<div style="font-size:10px;color:var(--ink3);margin-bottom:5px;">${escH(v.cuisine.replace(/;/g,' · '))}</div>`:''}
        <div class="venue-card-hours">${v.hours?'🕐 '+escH(formatHours(v.hours)):'<span style="color:var(--ink3);font-style:italic;">Hours not listed</span>'}</div>
        <div class="venue-card-actions">
          <select class="day-select" id="daysel-${v.id}">${dayOptions}</select>
          <button class="add-day-btn wd" id="addbtn-${v.id}" onclick="addVenueToDay('${v.id}',this)">+ Add</button>
          ${v.website?`<a href="${escH(v.website)}" target="_blank" style="font-size:11px;padding:5px 10px;border-radius:var(--radius-sm);border:1.5px solid #E0DEDB;color:var(--ink2);text-decoration:none;display:flex;align-items:center;gap:4px;font-weight:500;">Website ↗</a>`:''}
        </div>
      </div>`;
    card.onclick=e=>{if(e.target.tagName==='BUTTON'||e.target.tagName==='A'||e.target.tagName==='SELECT'||e.target.tagName==='OPTION')return;highlightVenue(v.id,v.lat,v.lon);};
    grid.appendChild(card);
    // Update add button colour based on day selection
    const sel=card.querySelector(`#daysel-${v.id}`);
    const addBtn=card.querySelector('.add-day-btn');
    sel.onchange=()=>{
      const cls=DAY_CLS(sel.value);
      addBtn.className='add-day-btn '+(cls==='wd'?'wd':'we');
    };
  });
}

function updateVenueMarkers(){
  venueMarkers.forEach(m=>leafletMap.removeLayer(m));venueMarkers=[];
  getFilteredVenues().forEach(v=>{
    const tc=TYPE_COLORS[v.type]||{bg:'#888',text:'#fff'};
    const em=typeEmoji(v.type);
    const icon=L.divIcon({className:'',html:`<div style="width:30px;height:30px;border-radius:50%;background:${tc.bg};border:2px solid ${tc.text};display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer;">${em}</div>`,iconSize:[30,30],iconAnchor:[15,15]});
    const marker=L.marker([v.lat,v.lon],{icon}).addTo(leafletMap);
    marker.bindPopup(`<strong>${v.name}</strong><br><span style="font-size:11px;color:#666;">${v.type} · ${fmtDist(v.dist)} away${v.address?' · '+v.address:''}</span>`);
    marker.on('click',()=>highlightVenue(v.id,v.lat,v.lon));
    venueMarkers.push(marker);
  });
}

function highlightVenue(id,lat,lon){
  highlightedVenueId=id;
  document.querySelectorAll('.venue-card').forEach(c=>c.classList.remove('highlighted'));
  const card=document.getElementById('vcard-'+id);
  if(card){card.classList.add('highlighted');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
  leafletMap.setView([lat,lon],17);
}

async function plotItineraryPins(){
  itinMarkers.forEach(m=>leafletMap.removeLayer(m));itinMarkers=[];
  const all=DAYS.flatMap((d,i)=>activities[d].map(a=>({...a,day:d,dayIdx:i}))).filter(a=>a.location);
  const pinsEl=document.getElementById('itineraryPins');pinsEl.innerHTML='';
  if(!all.length)return;
  const title=document.createElement('div');title.className='pin-section-title';title.textContent='Your itinerary';
  const list=document.createElement('div');list.className='pin-list';
  pinsEl.appendChild(title);pinsEl.appendChild(list);
  const bounds=[];let i=0;
  for(const act of all){
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(act.location)}&format=json&limit=1`);
      const d=await r.json();
      if(!d.length)continue;
      const lat=parseFloat(d[0].lat),lon=parseFloat(d[0].lon);
      const color=DAY_COLOR(act.day);
      const icon=L.divIcon({className:'',html:`<div style="width:28px;height:28px;border-radius:50%;background:${color};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.25);">${i+1}</div>`,iconSize:[28,28],iconAnchor:[14,14]});
      const marker=L.marker([lat,lon],{icon}).addTo(leafletMap);
      marker.bindPopup(`<strong>${act.name}</strong><br>${act.day} · ${act.time}`);
      itinMarkers.push(marker);bounds.push([lat,lon]);
      const item=document.createElement('div');item.className='pin-item';
      item.innerHTML=`<div class="pin-badge" style="background:${color};">${i+1}</div><div style="flex:1;min-width:0;"><div class="pin-name">${escH(act.name)}</div><div class="pin-sub">${act.day} · ${act.time} · ${escH(act.location)}</div></div><button onclick="removeFromItinerary('${act.day}',${act.id},this)" style="flex-shrink:0;width:24px;height:24px;border-radius:5px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#aaa;display:flex;align-items:center;justify-content:center;" title="Remove from itinerary">✕</button>`;
      list.appendChild(item);i++;
    }catch(e){}
  }
  if(bounds.length&&!searchCenter)leafletMap.fitBounds(bounds,{padding:[40,40]});
}

function addVenueToDay(venueId,btn){
  const sel=document.getElementById('daysel-'+venueId);
  const day=sel?sel.value:DAYS[0];
  const v=allVenues.find(x=>String(x.id)===String(venueId));
  if(!v)return;
  activities[day].push({id:nextId++,name:v.name,time:'12:00',location:v.address||v.name,cost:0,notes:v.hours?'Hours: '+v.hours:''});
  activities[day].sort((a,b)=>a.time.localeCompare(b.time));
  if(btn){btn.textContent='Added ✓';btn.style.background='#0A5C38';setTimeout(()=>{btn.textContent='+ Add';btn.style.background='';const cls=DAY_CLS(day);btn.className='add-day-btn '+(cls==='wd'?'wd':'we');},2000);}
  render();
}

function removeFromItinerary(day,id,btn){
  activities[day]=activities[day].filter(a=>a.id!==id);
  render();
  // Re-plot pins after short delay to let render settle
  setTimeout(()=>plotItineraryPins(),50);
}

// ── TABS ───────────────────────────────────────────────────────────────────
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.getElementById('planTab').style.display=tab==='plan'?'':'none';
  document.getElementById('mapTab').style.display=tab==='map'?'':'none';
  document.getElementById('shareTab').style.display=tab==='share'?'':'none';
  if(tab==='map'){initMap();setTimeout(()=>{leafletMap&&leafletMap.invalidateSize();plotItineraryPins();},100);}
  if(tab==='share')generateShare();
}

// ── SHARE ──────────────────────────────────────────────────────────────────
function generateShare(){
  const name=document.getElementById('tripName').value||'My Week';
  const dest=document.getElementById('destInput').value;
  let out=`🗓 ${name}\n`;
  if(dest)out+=`📍 ${dest}\n`;
  out+=`${fmtDate(weekStart)} – ${fmtDate(addDays(weekStart,6))}\n\n`;
  let total=0;
  DAYS.forEach((day,di)=>{
    if(!activities[day].length)return;
    const date=addDays(weekStart,di);
    const dayTotal=activities[day].reduce((s,a)=>s+a.cost,0);
    const w=weatherData[day];
    out+=`── ${day} ${fmtShort(date)}${w?' '+w.icon+' '+w.max+'°C':''} · £${dayTotal} ──\n`;
    activities[day].forEach(a=>{
      out+=`  ${a.time}  ${a.name}${a.location?' @ '+a.location:''}  ${a.cost>0?'£'+a.cost:'Free'}\n`;
      if(a.notes)out+=`         ↳ ${a.notes}\n`;
      total+=a.cost;
    });
    out+='\n';
  });
  out+=`Total: £${total}`;
  const bv=parseFloat(document.getElementById('_budget')?.value);
  if(!isNaN(bv)&&bv>0)out+=`  |  Budget: £${bv}  |  Remaining: ${bv-total<0?'-':''}£${Math.abs(Math.round(bv-total))}`;
  document.getElementById('shareText').textContent=out;
}
function copyShare(){
  navigator.clipboard.writeText(document.getElementById('shareText').textContent).then(()=>{
    const b=event.target;b.textContent='Copied!';setTimeout(()=>b.textContent='Copy to clipboard',2000);
  });
}

init();
</script>
