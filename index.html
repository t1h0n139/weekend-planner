<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weekend Planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ededea;
    --text: #1a1a18; --text2: #6b6b66; --text3: #a0a09a;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --info: #185FA5; --success: #0F6E56; --danger: #A32D2D;
    --radius: 10px; --radius-sm: 7px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #e8e8e2; --text2: #9a9a94; --text3: #5a5a56;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --info: #85B7EB; --success: #5DCAA5; --danger: #F09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .app { max-width: 740px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .header { margin-bottom: 1.5rem; }
  .trip-name { font-size: 26px; font-weight: 600; color: var(--text); border: none; background: transparent; outline: none; width: 100%; margin-bottom: 8px; }
  .trip-name::placeholder { color: var(--text3); }
  .dest-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .dest-input { font-size: 14px; padding: 7px 11px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; width: 200px; }
  .dest-input:focus { border-color: var(--info); }
  .fetch-btn { padding: 7px 15px; font-size: 13px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; transition: background .15s; }
  .fetch-btn:hover { background: var(--bg2); }
  .weather-chip { display: flex; align-items: center; gap: 6px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 5px 11px; font-size: 13px; }
  .error-msg { font-size: 12px; color: var(--danger); }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .tab { font-size: 14px; padding: 8px 16px 11px; border: none; background: transparent; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .budget-bar { background: var(--bg2); border-radius: var(--radius); padding: 13px 16px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; border: 0.5px solid var(--border); }
  .budget-item { display: flex; flex-direction: column; }
  .budget-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
  .budget-val { font-size: 18px; font-weight: 500; }
  .budget-sep { width: 1px; height: 30px; background: var(--border); }
  .budget-input { font-size: 17px; font-weight: 500; border: none; background: transparent; outline: none; color: var(--text); width: 80px; }
  .day-section { margin-bottom: 2rem; }
  .day-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .day-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .day-weather-tag { font-size: 12px; color: var(--text2); font-weight: 400; text-transform: none; letter-spacing: 0; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 20px; padding: 2px 9px; }
  .activity-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 11px 13px; margin-bottom: 7px; display: flex; gap: 10px; align-items: flex-start; transition: box-shadow .15s; }
  .activity-card:hover { border-color: var(--border2); }
  .activity-time { font-size: 12px; color: var(--text2); min-width: 42px; padding-top: 2px; font-variant-numeric: tabular-nums; }
  .activity-body { flex: 1; }
  .activity-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .activity-meta { display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap; align-items: center; }
  .activity-loc { font-size: 12px; color: var(--text2); }
  .activity-cost { font-size: 12px; font-weight: 500; }
  .del-btn { background: transparent; border: none; cursor: pointer; font-size: 18px; color: var(--text3); padding: 0 2px; line-height: 1; transition: color .15s; }
  .del-btn:hover { color: var(--danger); }
  .add-form { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-top: 6px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-group label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
  .form-group input { width: 100%; font-size: 14px; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; }
  .form-group input:focus { border-color: var(--info); }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn { padding: 7px 16px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; border: 0.5px solid var(--border2); background: transparent; color: var(--text); transition: background .15s; }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: .85; }
  .add-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); background: transparent; border: 1px dashed var(--border2); border-radius: var(--radius-sm); padding: 8px 14px; cursor: pointer; width: 100%; margin-top: 4px; transition: all .15s; }
  .add-btn:hover { background: var(--bg2); color: var(--text); border-color: var(--text2); }
  .map-wrap { border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; height: 440px; background: var(--bg2); }
  #mapEl { width: 100%; height: 100%; }
  .map-empty { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 14px; color: var(--text3); text-align: center; padding: 2rem; }
  .pin-list { margin-top: 1rem; }
  .pin-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .pin-dot-lg { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; color: #fff; }
  .pin-name { font-size: 14px; font-weight: 500; }
  .pin-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .share-panel { background: var(--bg2); border-radius: var(--radius); padding: 16px; border: 0.5px solid var(--border); }
  .share-title { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
  .share-output { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 13px; color: var(--text2); white-space: pre-wrap; line-height: 1.7; margin-bottom: 12px; font-family: 'SF Mono', 'Fira Code', monospace; }
  .empty-day { font-size: 13px; color: var(--text3); padding: 10px 0; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <input class="trip-name" id="tripName" placeholder="Name your trip..." value="Weekend in Edinburgh" />
    <div class="dest-row">
      <input class="dest-input" id="destInput" placeholder="Destination city..." value="Edinburgh" />
      <button class="fetch-btn" onclick="fetchWeather()">Get weather</button>
      <div class="weather-chip" id="weatherChip" style="display:none;"></div>
      <div class="error-msg" id="weatherError"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('plan',this)">Plan</button>
    <button class="tab" onclick="switchTab('map',this)">Map</button>
    <button class="tab" onclick="switchTab('share',this)">Share</button>
  </div>

  <!-- Plan Tab -->
  <div id="planTab">
    <div class="budget-bar">
      <div class="budget-item">
        <span class="budget-label">Activities</span>
        <span class="budget-val" id="totalCount">0</span>
      </div>
      <div class="budget-sep"></div>
      <div class="budget-item">
        <span class="budget-label">Est. cost</span>
        <span class="budget-val" id="totalCost" style="color:var(--info)">£0</span>
      </div>
      <div class="budget-sep"></div>
      <div class="budget-item">
        <span class="budget-label">Budget</span>
        <input class="budget-input" id="budgetInput" type="number" placeholder="set..." min="0" />
      </div>
      <div class="budget-sep" id="remSep" style="display:none;"></div>
      <div class="budget-item" id="remItem" style="display:none;">
        <span class="budget-label">Remaining</span>
        <span class="budget-val" id="remVal">£0</span>
      </div>
    </div>
    <div id="daysSections"></div>
  </div>

  <!-- Map Tab -->
  <div id="mapTab" style="display:none;">
    <div class="map-wrap" id="mapWrap">
      <div class="map-empty" id="mapEmpty">Add activities with locations, then switch to this tab to see them on the map.</div>
      <div id="mapEl" style="display:none;"></div>
    </div>
    <div class="pin-list" id="pinList"></div>
  </div>

  <!-- Share Tab -->
  <div id="shareTab" style="display:none;">
    <div class="share-panel">
      <div class="share-title">Share your itinerary</div>
      <div class="share-output" id="shareText"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="copyShare()">Copy to clipboard</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const DAY_COLORS = { Saturday: '#1D9E75', Sunday: '#378ADD' };
let activities = { Saturday: [], Sunday: [] };
let openForm = null;
let weatherData = {};
let leafletMap = null;
let nextId = 100;

function getWeekendDates() {
  const today = new Date();
  const daysToSat = (6 - today.getDay() + 7) % 7 || 7;
  const sat = new Date(today); sat.setDate(today.getDate() + daysToSat);
  const sun = new Date(sat); sun.setDate(sat.getDate() + 1);
  return [sat, sun];
}
function fmtDate(d) { return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' }); }

function init() {
  activities = {
    Saturday: [
      { id: 1, name: 'Breakfast at The Pantry', time: '09:00', location: 'Stockbridge, Edinburgh', cost: 18 },
      { id: 2, name: 'Edinburgh Castle', time: '11:00', location: 'Castle Rock, Edinburgh', cost: 22 },
      { id: 3, name: 'Lunch on the Royal Mile', time: '13:30', location: 'Old Town, Edinburgh', cost: 15 },
    ],
    Sunday: [
      { id: 4, name: "Arthur's Seat hike", time: '09:30', location: 'Holyrood Park, Edinburgh', cost: 0 },
      { id: 5, name: 'Brunch at Dishoom', time: '12:00', location: 'St Andrew Square, Edinburgh', cost: 24 },
    ]
  };
  document.getElementById('budgetInput').addEventListener('input', render);
  const [sat, sun] = getWeekendDates();
  document.querySelector('.trip-name').setAttribute('placeholder', 'Name your trip...');
  render();
}

async function fetchWeather() {
  const dest = document.getElementById('destInput').value.trim();
  if (!dest) return;
  const chip = document.getElementById('weatherChip');
  const err = document.getElementById('weatherError');
  chip.textContent = 'Fetching...'; chip.style.display = 'flex'; err.textContent = '';
  try {
    const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(dest)}&format=json&limit=1`);
    const geoData = await geoRes.json();
    if (!geoData.length) throw new Error('Location not found');
    const { lat, lon } = geoData[0];
    const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=16`);
    const wData = await wRes.json();
    const [sat, sun] = getWeekendDates();
    const satStr = sat.toISOString().slice(0, 10);
    const sunStr = sun.toISOString().slice(0, 10);
    const times = wData.daily.time;
    const satIdx = times.indexOf(satStr);
    const sunIdx = times.indexOf(sunStr);
    weatherData = {};
    if (satIdx >= 0) weatherData.Saturday = parseWeather(wData.daily, satIdx);
    if (sunIdx >= 0) weatherData.Sunday = parseWeather(wData.daily, sunIdx);
    const any = weatherData.Saturday || weatherData.Sunday;
    chip.textContent = any ? `${any.icon} ${dest} · ${any.desc}, ${any.max}°C` : `${dest} · forecast not yet available`;
    render();
  } catch (e) {
    chip.style.display = 'none';
    err.textContent = e.message || 'Could not fetch weather';
  }
}

function parseWeather(daily, idx) {
  const code = daily.weathercode[idx];
  const max = Math.round(daily.temperature_2m_max[idx]);
  const min = Math.round(daily.temperature_2m_min[idx]);
  const rain = daily.precipitation_probability_max[idx];
  const { icon, desc, outdoor } = wmoToDesc(code, rain);
  return { code, max, min, rain, icon, desc, outdoor };
}

function wmoToDesc(code, rain) {
  if (code === 0)  return { icon: '☀️', desc: 'Clear sky', outdoor: true };
  if (code <= 2)   return { icon: '⛅', desc: 'Partly cloudy', outdoor: true };
  if (code === 3)  return { icon: '☁️', desc: 'Overcast', outdoor: rain < 40 };
  if (code <= 49)  return { icon: '🌫️', desc: 'Foggy', outdoor: false };
  if (code <= 59)  return { icon: '🌦️', desc: 'Drizzle', outdoor: false };
  if (code <= 69)  return { icon: '🌧️', desc: 'Rain', outdoor: false };
  if (code <= 79)  return { icon: '🌨️', desc: 'Snow', outdoor: false };
  if (code <= 84)  return { icon: '🌦️', desc: 'Rain showers', outdoor: rain < 50 };
  return { icon: '⛈️', desc: 'Thunderstorm', outdoor: false };
}

function render() {
  const container = document.getElementById('daysSections');
  container.innerHTML = '';
  let total = 0, count = 0;

  ['Saturday', 'Sunday'].forEach(day => {
    const acts = activities[day];
    const w = weatherData[day];
    const section = document.createElement('div');
    section.className = 'day-section';

    const lbl = document.createElement('div');
    lbl.className = 'day-label';
    lbl.innerHTML = `<span class="day-dot" style="background:${DAY_COLORS[day]}"></span>${day}` +
      (w ? `<span class="day-weather-tag">${w.icon} ${w.desc} · ${w.max}°C / ${w.min}°C · ${w.rain}% rain · ${w.outdoor ? 'outdoor-friendly' : 'indoor recommended'}</span>` : '');
    section.appendChild(lbl);

    if (acts.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-day';
      empty.textContent = 'No activities yet.';
      section.appendChild(empty);
    }

    acts.forEach(a => {
      total += a.cost; count++;
      const card = document.createElement('div');
      card.className = 'activity-card';
      const costColor = a.cost > 0 ? 'var(--info)' : 'var(--success)';
      card.innerHTML = `<div class="activity-time">${a.time}</div>
        <div class="activity-body">
          <div class="activity-name">${escHtml(a.name)}</div>
          <div class="activity-meta">
            ${a.location ? `<span class="activity-loc">📍 ${escHtml(a.location)}</span>` : ''}
            <span class="activity-cost" style="color:${costColor}">${a.cost > 0 ? '£' + a.cost : 'Free'}</span>
          </div>
        </div>
        <button class="del-btn" onclick="deleteActivity('${day}',${a.id})" title="Remove">×</button>`;
      section.appendChild(card);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.innerHTML = `<span style="font-size:18px;line-height:1">+</span> Add activity`;
    addBtn.onclick = () => { openForm = openForm === day ? null : day; render(); };
    section.appendChild(addBtn);

    if (openForm === day) section.appendChild(buildForm(day));
    container.appendChild(section);
  });

  document.getElementById('totalCount').textContent = count;
  document.getElementById('totalCost').textContent = '£' + total;

  const budget = parseFloat(document.getElementById('budgetInput').value);
  if (!isNaN(budget) && budget > 0) {
    const rem = budget - total;
    document.getElementById('remItem').style.display = '';
    document.getElementById('remSep').style.display = '';
    const rv = document.getElementById('remVal');
    rv.textContent = (rem < 0 ? '-£' : '£') + Math.abs(Math.round(rem));
    rv.style.color = rem < 0 ? 'var(--danger)' : 'var(--success)';
  } else {
    document.getElementById('remItem').style.display = 'none';
    document.getElementById('remSep').style.display = 'none';
  }
}

function buildForm(day) {
  const form = document.createElement('div');
  form.className = 'add-form';
  form.innerHTML = `
    <div class="form-grid">
      <div class="form-group"><label>Activity name</label><input id="fName" placeholder="e.g. Portobello Market" /></div>
      <div class="form-group"><label>Time</label><input id="fTime" type="time" value="10:00" /></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Location</label><input id="fLoc" placeholder="e.g. Portobello, Edinburgh" /></div>
      <div class="form-group"><label>Cost (£)</label><input id="fCost" type="number" placeholder="0" min="0" /></div>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="openForm=null;render()">Cancel</button>
      <button class="btn btn-primary" onclick="addActivity('${day}')">Add to ${day}</button>
    </div>`;
  setTimeout(() => { const el = document.getElementById('fName'); if (el) el.focus(); }, 50);
  return form;
}

function addActivity(day) {
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); return; }
  activities[day].push({
    id: nextId++, name,
    time: document.getElementById('fTime').value || '12:00',
    location: document.getElementById('fLoc').value.trim(),
    cost: parseFloat(document.getElementById('fCost').value) || 0
  });
  activities[day].sort((a, b) => a.time.localeCompare(b.time));
  openForm = null;
  render();
}

function deleteActivity(day, id) {
  activities[day] = activities[day].filter(a => a.id !== id);
  render();
}

async function renderMap() {
  const mapEmpty = document.getElementById('mapEmpty');
  const mapEl = document.getElementById('mapEl');
  const pinList = document.getElementById('pinList');
  const allActs = [
    ...activities.Saturday.map(a => ({...a, day:'Saturday'})),
    ...activities.Sunday.map(a => ({...a, day:'Sunday'}))
  ].filter(a => a.location);

  if (!allActs.length) {
    mapEmpty.style.display = 'flex'; mapEl.style.display = 'none';
    pinList.innerHTML = ''; return;
  }
  mapEmpty.textContent = 'Locating activities...';

  const geocoded = [];
  for (const act of allActs) {
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(act.location)}&format=json&limit=1`);
      const d = await r.json();
      if (d.length) geocoded.push({ ...act, lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon) });
    } catch (e) {}
  }

  if (!geocoded.length) {
    mapEmpty.textContent = 'Could not locate any activities. Try adding more specific location names.';
    mapEmpty.style.display = 'flex'; mapEl.style.display = 'none'; return;
  }

  mapEmpty.style.display = 'none'; mapEl.style.display = '';
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  leafletMap = L.map('mapEl');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors'
  }).addTo(leafletMap);

  const bounds = [];
  geocoded.forEach((act, i) => {
    const color = DAY_COLORS[act.day];
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:28px;height:28px;border-radius:50%;background:${color};border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white;box-shadow:0 2px 6px rgba(0,0,0,.3)">${i+1}</div>`,
      iconSize: [28, 28], iconAnchor: [14, 14]
    });
    L.marker([act.lat, act.lon], { icon }).addTo(leafletMap)
      .bindPopup(`<strong>${act.name}</strong><br>${act.day} · ${act.time}${act.cost > 0 ? ' · £' + act.cost : ' · Free'}<br><small>${act.location}</small>`);
    bounds.push([act.lat, act.lon]);
  });
  leafletMap.fitBounds(bounds, { padding: [40, 40] });

  pinList.innerHTML = '';
  geocoded.forEach((act, i) => {
    const item = document.createElement('div');
    item.className = 'pin-item';
    item.innerHTML = `<div class="pin-dot-lg" style="background:${DAY_COLORS[act.day]}">${i+1}</div>
      <div><div class="pin-name">${escHtml(act.name)}</div>
      <div class="pin-sub">${act.day} · ${act.time} · ${escHtml(act.location)}${act.cost > 0 ? ' · £'+act.cost : ' · Free'}</div></div>`;
    pinList.appendChild(item);
  });
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('planTab').style.display = tab === 'plan' ? '' : 'none';
  document.getElementById('mapTab').style.display = tab === 'map' ? '' : 'none';
  document.getElementById('shareTab').style.display = tab === 'share' ? '' : 'none';
  if (tab === 'map') renderMap();
  if (tab === 'share') generateShare();
}

function generateShare() {
  const name = document.getElementById('tripName').value || 'Our Weekend';
  const dest = document.getElementById('destInput').value;
  const [sat, sun] = getWeekendDates();
  let out = `🗓 ${name}\n${fmtDate(sat)} – ${fmtDate(sun)}\n`;
  if (dest) out += `📍 ${dest}\n`;
  const satW = weatherData.Saturday, sunW = weatherData.Sunday;
  if (satW) out += `Saturday: ${satW.icon} ${satW.desc}, ${satW.max}°C\n`;
  if (sunW) out += `Sunday: ${sunW.icon} ${sunW.desc}, ${sunW.max}°C\n`;
  out += '\n';
  let total = 0;
  ['Saturday', 'Sunday'].forEach(day => {
    if (!activities[day].length) return;
    out += `── ${day} ──\n`;
    activities[day].forEach(a => {
      out += `${a.time}  ${a.name}${a.location ? ' @ ' + a.location : ''}  ${a.cost > 0 ? '£' + a.cost : 'Free'}\n`;
      total += a.cost;
    });
    out += '\n';
  });
  out += `Total estimated cost: £${total}`;
  const budget = parseFloat(document.getElementById('budgetInput').value);
  if (!isNaN(budget) && budget > 0) {
    out += `\nBudget: £${budget}  |  Remaining: ${budget - total < 0 ? '-£' : '£'}${Math.abs(Math.round(budget - total))}`;
  }
  document.getElementById('shareText').textContent = out;
}

function copyShare() {
  navigator.clipboard.writeText(document.getElementById('shareText').textContent).then(() => {
    const btn = event.target; btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy to clipboard', 2000);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
